version: '3.8'

services:
  library-webapp:
    build: .
    container_name: robotedge-library
    ports:
      - "8080:8000"
    volumes:
      # Mount the static covers directory so cached covers persist
      - ./app/static/covers:/app/static/covers
      # Mount the data folder for SQLite database persistence
      - ./app/data:/app/data
      # Mount the PDF directory as read-only from the absolute path in VPS
      - /home/PDF:/app/books:ro
    environment:
      - BOOKS_DIR=/app/books
      - DB_PATH=/app/data/stats.db
      - DOWNLOAD_LIMIT_DAILY=10
      - ADMIN_PASSWORD=RobotEdge2026
    restart: always

